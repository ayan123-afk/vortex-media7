<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up • Vortex Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg: #000; --card: #121212; --accent: #0095f6; --text: #fff; --gray: #262626; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: var(--card); border: 1px solid var(--gray); padding: 40px; width: 350px; text-align: center; border-radius: 4px; }
        h1 { font-size: 2.2rem; margin-bottom: 10px; font-weight: 700; letter-spacing: -1px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid var(--gray); color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 15px; }
        .footer { margin-top: 20px; font-size: 0.9rem; color: #a8a8a8; }
        .footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="box">
    <h1>Vortex Media</h1>
    <p style="color:#a8a8a8; margin-bottom:20px;">Sign up to share moments with friends.</p>
    <input type="text" id="username" placeholder="Username">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="signupBtn" onclick="handleSignup()">Sign Up</button>
    <div class="footer">
        Have an account? <a href="login.html">Log in</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDMnD-ZMnrWWWcv2pMnNCOeVPi6tv6X7xA",
        authDomain: "vortex-media-da0e7.firebaseapp.com",
        projectId: "vortex-media-da0e7",
        storageBucket: "vortex-media-da0e7.firebasestorage.app",
        messagingSenderId: "422977677460",
        appId: "1:422977677460:web:18dad3d9a07eb193052c81"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.handleSignup = async () => {
        const user = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('signupBtn');

        if(!user || !email || !pass) {
            return Swal.fire('Error', 'Please fill all fields', 'error');
        }

        btn.disabled = true;
        btn.innerText = "Creating Account...";

        try {
            // 1. Create user in Firebase Auth
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            
            // 2. Create user document in Firestore
            await setDoc(doc(db, "users", res.user.uid), {
                userId: res.user.uid,
                username: user,
                email: email,
                profilePicture: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                bio: "Welcome to my Vortex Media profile!",
                followers: 0,
                following: 0,
                postsCount: 0,
                role: "user",
                isBanned: false,
                createdAt: serverTimestamp()
            });

            Swal.fire('Success', 'Welcome to Vortex Media!', 'success').then(() => {
                window.location.href = 'feed.html';
            });
        } catch (error) {
            btn.disabled = false;
            btn.innerText = "Sign Up";
            Swal.fire('Signup Failed', error.message, 'error');
        }
    };
</script>
</body>
</html>
