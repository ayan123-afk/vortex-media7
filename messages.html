<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages • Vortex Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 300px; border-right: 1px solid #262626; padding: 20px; overflow-y: auto; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #000; }
        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 20px; font-size: 0.9rem; }
        .sent { align-self: flex-end; background: #0095f6; }
        .received { align-self: flex-start; background: #262626; }
        .input-area { padding: 20px; border-top: 1px solid #262626; display: flex; gap: 10px; }
        input { flex: 1; background: #121212; border: 1px solid #262626; color: white; padding: 10px; border-radius: 20px; outline: none; }
        button { background: #0095f6; border: none; color: white; padding: 5px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Messages</h3>
        <p style="color:#a8a8a8; font-size:0.8rem">Select a user to chat</p>
    </div>
    <div class="chat-area">
        <div class="msg-box" id="msgBox">
            <p style="text-align:center; color:#a8a8a8; margin-top:200px;">Start a conversation!</p>
        </div>
        <div class="input-area">
            <input type="text" id="mInput" placeholder="Message...">
            <button onclick="sendMsg()">Send</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDMnD-ZMnrWWWcv2pMnNCOeVPi6tv6X7xA", authDomain: "vortex-media-da0e7.firebaseapp.com", projectId: "vortex-media-da0e7", storageBucket: "vortex-media-da0e7.firebasestorage.app", messagingSenderId: "422977677460", appId: "1:422977677460:web:18dad3d9a07eb193052c81" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Simple real-time listener for global chat (for demo)
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('msgBox');
            box.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const type = m.senderId === auth.currentUser.uid ? 'sent' : 'received';
                box.innerHTML += `<div class="msg ${type}">${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        window.sendMsg = async () => {
            const text = document.getElementById('mInput').value;
            if (!text) return;
            await addDoc(collection(db, "messages"), {
                senderId: auth.currentUser.uid,
                text: text,
                timestamp: serverTimestamp()
            });
            document.getElementById('mInput').value = "";
        };
    </script>
</body>
</html>
