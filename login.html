<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login • Vortex Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #121212; border: 1px solid #262626; padding: 40px; width: 350px; text-align: center; border-radius: 5px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #262626; color: #fff; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0095f6; border: none; color: #fff; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        a { color: #0095f6; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="box">
        <h1 style="font-weight: 700; letter-spacing: -1px;">Vortex Media</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="handleLogin()">Log In</button>
        <p style="color: #a8a8a8; font-size: 0.9rem; margin-top: 20px;">Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDMnD-ZMnrWWWcv2pMnNCOeVPi6tv6X7xA", authDomain: "vortex-media-da0e7.firebaseapp.com", projectId: "vortex-media-da0e7", storageBucket: "vortex-media-da0e7.firebasestorage.app", messagingSenderId: "422977677460", appId: "1:422977677460:web:18dad3d9a07eb193052c81" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            try {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                const userDoc = await getDoc(doc(db, "users", res.user.uid));

                // Admin check: Auto-create if it's the specific admin credentials but no doc exists
                if (!userDoc.exists() && email === "admin@vortexmedia.com") {
                    await setDoc(doc(db, "users", res.user.uid), {
                        username: "Admin", email: email, role: "admin", isBanned: false, bio: "Platform Administrator", followers: 0, following: 0, postsCount: 0, createdAt: serverTimestamp()
                    });
                    window.location.href = "admin.html";
                    return;
                }

                if (userDoc.exists()) {
                    const data = userDoc.data();
                    if (data.isBanned) {
                        Swal.fire('Banned', 'Your account has been banned by the administrator.', 'error');
                        await signOut(auth);
                        return;
                    }
                    if (data.role === 'admin') window.location.href = "admin.html";
                    else window.location.href = "feed.html";
                }
            } catch (e) { Swal.fire('Error', e.message, 'error'); }
        };
    </script>
</body>
</html>
