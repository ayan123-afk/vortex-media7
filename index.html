<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vortex Media | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --accent: #0095f6; --text: #fff; --gray: #262626; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; margin: 0; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        h1 { font-size: 4rem; margin: 0; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #a8a8a8; font-size: 1.2rem; margin: 20px 0; max-width: 600px; }
        .btn-box { display: flex; gap: 15px; }
        .btn { padding: 12px 35px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .btn-p { background: var(--accent); color: #fff; }
        .btn-s { border: 1px solid var(--gray); color: #fff; }
        .features { padding: 50px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        .f-card { background: #121212; padding: 30px; border-radius: 15px; border: 1px solid var(--gray); text-align: center; }
        .f-card i { font-size: 2.5rem; color: var(--accent); margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Vortex Media</h1>
        <p>A premium social space to share moments, chat in real-time, and discover the world.</p>
        <div class="btn-box">
            <a href="login.html" class="btn btn-s">Log In</a>
            <a href="signup.html" class="btn btn-p">Get Started</a>
        </div>
    </div>
    <div class="features">
        <div class="f-card"><i class="fas fa-bolt"></i><h3>Real-time</h3><p>Instant likes, comments, and messages.</p></div>
        <div class="f-card"><i class="fas fa-shield-alt"></i><h3>Secure</h3><p>Advanced moderation and admin tools.</p></div>
        <div class="f-card"><i class="fas fa-mobile-alt"></i><h3>Responsive</h3><p>Perfect on mobile and desktop.</p></div>
    </div>
</body>
</html>
