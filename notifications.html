<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notifications • Vortex Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .noti { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #262626; gap: 15px; }
        .noti img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .noti-text { flex: 1; font-size: 0.9rem; }
        .noti-time { font-size: 0.75rem; color: #a8a8a8; }
        .unread { background: #121212; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="margin-bottom:30px;">Notifications</h2>
        <div id="notiList">
            <!-- Notifications will appear here -->
             <p style="text-align: center; color: #a8a8a8; margin-top: 50px;">No new notifications.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDMnD-ZMnrWWWcv2pMnNCOeVPi6tv6X7xA", authDomain: "vortex-media-da0e7.firebaseapp.com", projectId: "vortex-media-da0e7", storageBucket: "vortex-media-da0e7.firebasestorage.app", messagingSenderId: "422977677460", appId: "1:422977677460:web:18dad3d9a07eb193052c81" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) return;
            const q = query(collection(db, "notifications"), where("userId", "==", user.uid), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            const list = document.getElementById('notiList');
            if(!snap.empty) list.innerHTML = "";
            
            snap.forEach(doc => {
                const n = doc.data();
                list.innerHTML += `
                    <div class="noti ${n.readStatus ? '' : 'unread'}">
                        <img src="${n.fromUserPic || 'https://via.placeholder.com/150'}">
                        <div class="noti-text">
                            <strong>${n.fromUser}</strong> ${n.type === 'like' ? 'liked your post.' : n.type === 'comment' ? 'commented on your post.' : 'followed you.'}
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
